<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="'Courier New', Consolas, monospace">
  <style>
    .ln  { clip-path: inset(0 100% 0 0); animation: type .45s steps(40) forwards; }
    .cur { animation: blink 1s steps(2) infinite; }
    @keyframes type  { to { clip-path: inset(0 0 0 0); } }
    @keyframes blink { 50% { opacity: 0; } }
    .t   { animation-delay: 0s;    }
    .l1  { animation-delay: 1.0s;  } .l2  { animation-delay: 1.4s;  }
    .l3  { animation-delay: 1.9s;  } .l4  { animation-delay: 2.3s;  }
    .l5  { animation-delay: 2.8s;  } .l6  { animation-delay: 3.1s;  }
    .l7  { animation-delay: 3.4s;  } .l8  { animation-delay: 3.7s;  }
    .l9  { animation-delay: 4.2s;  } .l10 { animation-delay: 4.5s;  }
    .l11 { animation-delay: 4.8s;  } .l12 { animation-delay: 5.1s;  }
  </style>

  <rect width="900" height="560" fill="#000000"/>
  <rect x="0" y="0" width="900" height="40" fill="#0a0a0a" stroke="#1a1a1a"/>
  <circle cx="24" cy="20" r="7" fill="#ffffff"/>
  <circle cx="48" cy="20" r="7" fill="#ffffff"/>
  <circle cx="72" cy="20" r="7" fill="#ffffff"/>
  <text x="450" y="25" fill="#ffffff" font-size="14" text-anchor="middle">arch@github: ~</text>

  <!-- ASCII block title -->
  <g fill="#ffffff" font-size="16" class="ln t">
    <text x="60" y="100"> ██████╗ ██████╗ ██████╗ ███████╗███╗   ██╗    ████████╗███████╗██████╗</text>
    <text x="60" y="120">██╔════╝██╔═══██╗██╔══██╗██╔════╝████╗  ██║    ╚══██╔══╝██╔════╝██╔══██╗</text>
    <text x="60" y="140">██║     ██║   ██║██║  ██║█████╗  ██╔██╗ ██║       ██║   █████╗  ██████╔╝</text>
    <text x="60" y="160">██║     ██║   ██║██║  ██║██╔══╝  ██║╚██╗██║       ██║   ██╔══╝  ██╔══██╗</text>
    <text x="60" y="180">╚██████╗╚██████╔╝██████╔╝███████╗██║ ╚████║       ██║   ███████╗██║  ██║</text>
    <text x="60" y="200"> ╚═════╝ ╚═════╝ ╚═════╝ ╚══════╝╚═╝  ╚═══╝       ╚═╝   ╚══════╝╚═╝  ╚═╝</text>
  </g>

  <!-- terminal body -->
  <g fill="#ffffff" font-size="15">
    <text x="60" y="250" class="ln l1">$ whoami</text>
    <text x="80" y="272" class="ln l2">[YOUR NAME]  —  [YOUR ROLE, e.g. Backend Engineer]</text>

    <text x="60" y="308" class="ln l3">$ cat about.txt</text>
    <text x="80" y="330" class="ln l4">[One or two lines about you. What you build and care about.]</text>

    <text x="60" y="366" class="ln l5">$ ls ./stack</text>
    <text x="80" y="388" class="ln l6">languages : [Python, Go, TypeScript]</text>
    <text x="80" y="408" class="ln l7">frameworks: [React, Django]</text>
    <text x="80" y="428" class="ln l8">tooling   : [Docker, Git]</text>

    <text x="60" y="464" class="ln l9">$ ./connect --help</text>
    <text x="80" y="486" class="ln l10">github : https://github.com/[USERNAME]</text>
    <text x="80" y="506" class="ln l11">email  : [you@example.com]</text>

    <text x="60" y="542" class="ln l12 cur">$ <tspan>█</tspan></text>
  </g>
</svg>
